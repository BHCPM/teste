<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Decisor - Gemini</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9fb; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #app { width: 100%; max-width: 550px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .monitor-decisao { background: #2d3436; color: #00ffca; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; margin: 20px 0; font-size: 13px; border-left: 5px solid var(--primary); }
        #chat { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 10px; font-size: 14px; max-width: 85%; }
        .user { align-self: flex-end; background: #e1e7ff; color: #3b4bad; }
        .ai { align-self: flex-start; background: #f1f2f6; color: #2f3542; }
        .sentimento-tag { font-weight: bold; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; font-size: 11px; }
        .positivo { background: #00b894; color: white; }
        .negativo { background: #d63031; color: white; }
        .neutro { background: #b2bec3; color: white; }
        input { width: 80%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 15%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app">
        <h2 style="margin-top:0; color:#2d3436">Analista de Sentimentos</h2>
        
        <div id="chat">
            <div class="bubble ai">Olá Felipe! Digite algo para eu analisar e tomar uma decisão.</div>
        </div>

        <div id="badge-area"></div>

        <div class="monitor-decisao" id="monitor">
            LOG DE SISTEMA: Aguardando interação...
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <input type="text" id="userInput" placeholder="Ex: Meu pedido chegou quebrado!">
            <button onclick="enviar()">Ok</button>
        </div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const monitor = document.getElementById('monitor');
            const badgeArea = document.getElementById('badge-area');
            const texto = input.value;

            if(!texto) return;

            chat.innerHTML += `<div class="bubble user">${texto}</div>`;
            input.value = "";
            monitor.innerText = "SISTEMA: Analisando intenção e sentimento...";

            try {
                const response = await fetch('/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: texto })
                });

                const data = await response.json();

                // Exibir Badge de Sentimento
                badgeArea.innerHTML = `<span class="sentimento-tag ${data.sentimento}">${data.sentimento} (${data.confianca}%)</span>`;
                
                // Exibir Decisão do Sistema no Monitor
                monitor.innerText = data.acaoExecutada;

                // Resposta da IA no Chat
                chat.innerHTML += `<div class="bubble ai"><b>Gemini:</b> ${data.resposta}</div>`;
                chat.scrollTop = chat.scrollHeight;

            } catch (err) {
                monitor.innerText = "SISTEMA: Erro ao processar dados.";
            }
        }
    </script>
</body>
</html>
